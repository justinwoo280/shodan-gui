name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build
        env:
          GOARCH: amd64
          GOOS: windows

      - name: Rename binary
        run: move build\bin\shodan-gui.exe shodan-gui-windows-amd64.exe

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: shodan-gui-windows-amd64.exe
          draft: false
          prerelease: false

  release-macos:
    # Use native runners for each architecture to avoid CGo cross-compilation issues.
    # macos-13 = Intel x86_64 (amd64), macos-latest = Apple Silicon arm64.
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            name: shodan-gui-darwin-amd64
            runner: macos-13
          - arch: arm64
            name: shodan-gui-darwin-arm64
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # No GOARCH/GOOS overrides — each job runs on its native architecture.
      # wails build outputs a .app bundle at build/bin/shodan-gui.app on macOS,
      # not a flat binary at build/bin/shodan-gui.
      - name: Build
        run: wails build

      - name: Package .app bundle
        run: cd build/bin && zip -r ../../${{ matrix.name }}.zip shodan-gui.app

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}.zip
          draft: false
          prerelease: false

  release-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build
        env:
          GOARCH: amd64
          GOOS: linux

      - name: Rename binary
        run: mv build/bin/shodan-gui shodan-gui-linux-amd64

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: shodan-gui-linux-amd64
