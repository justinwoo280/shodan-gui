name: Build

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "*.md"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "*.md"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build
        env:
          GOARCH: amd64
          GOOS: windows

      - uses: actions/upload-artifact@v4
        with:
          name: shodan-gui-windows-amd64
          path: build/bin/shodan-gui.exe

  build-macos:
    # Use native runners for each architecture to avoid CGo cross-compilation issues.
    # macos-13 = Intel x86_64 (amd64), macos-latest = Apple Silicon arm64.
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: macos-13
          - arch: arm64
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # No GOARCH/GOOS overrides — each job runs on its native architecture.
      # wails build outputs a .app bundle at build/bin/shodan-gui.app on macOS,
      # not a flat binary at build/bin/shodan-gui.
      - name: Build
        run: wails build

      - uses: actions/upload-artifact@v4
        with:
          name: shodan-gui-darwin-${{ matrix.arch }}
          path: build/bin/shodan-gui.app

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build
        env:
          GOARCH: amd64
          GOOS: linux

      - uses: actions/upload-artifact@v4
        with:
          name: shodan-gui-linux-amd64
          path: build/bin/shodan-gui
